openapi: 3.0.0
info:
  title: Bidding Platform API
  version: 1.0.0
  description: REST API for the MERN Stack Auction Platform
servers:
  - url: http://localhost:5000/api/v1
    description: Local development server

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Created

  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Success

  /auctions:
    get:
      summary: List active auctions
      tags: [Auctions]
      responses:
        '200':
          description: Success
    post:
      summary: Create new auction
      tags: [Auctions]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterInput:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
